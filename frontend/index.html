<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .calculator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 {
    color: #fff;
    text-align: center;
    margin-bottom: 24px;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .display {
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: right;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .expression {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    min-height: 20px;
  }
  .result {
    color: #fff;
    font-size: 36px;
    font-weight: 300;
    word-break: break-all;
  }
  .error {
    color: #ff6b6b;
    font-size: 16px;
  }
  .inputs {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .input-row {
    display: flex;
    gap: 12px;
  }
  input[type="number"] {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    color: #fff;
    font-size: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus {
    border-color: rgba(138,100,255,0.6);
  }
  .operators {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .op-btn {
    background: rgba(138,100,255,0.15);
    border: 1px solid rgba(138,100,255,0.3);
    border-radius: 12px;
    color: #c4b5fd;
    font-size: 22px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .op-btn:hover { background: rgba(138,100,255,0.3); }
  .op-btn.active {
    background: rgba(138,100,255,0.5);
    border-color: rgba(138,100,255,0.8);
    color: #fff;
  }
  .calc-btn {
    width: 100%;
    background: linear-gradient(135deg, #8a64ff, #6c3ce0);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 18px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .calc-btn:hover { opacity: 0.9; }
  .calc-btn:active { transform: scale(0.98); }
  .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  @media (max-width: 420px) {
    .calculator { width: 95vw; padding: 20px; }
    .result { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="calculator">
  <h1>CALCULATOR</h1>
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="inputs">
    <div class="input-row">
      <input type="number" id="numA" placeholder="First number" step="any">
      <input type="number" id="numB" placeholder="Second number" step="any">
    </div>
  </div>
  <div class="operators">
    <button class="op-btn" data-op="+">+</button>
    <button class="op-btn" data-op="-">&minus;</button>
    <button class="op-btn" data-op="*">&times;</button>
    <button class="op-btn" data-op="/">&divide;</button>
  </div>
  <button class="calc-btn" id="calcBtn" disabled>Calculate</button>
</div>

<script>
const numA = document.getElementById('numA');
const numB = document.getElementById('numB');
const opBtns = document.querySelectorAll('.op-btn');
const calcBtn = document.getElementById('calcBtn');
const expression = document.getElementById('expression');
const result = document.getElementById('result');

let selectedOp = null;

opBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    opBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedOp = btn.dataset.op;
    updateBtn();
  });
});

[numA, numB].forEach(el => el.addEventListener('input', updateBtn));

function updateBtn() {
  calcBtn.disabled = !(numA.value !== '' && numB.value !== '' && selectedOp);
}

calcBtn.addEventListener('click', async () => {
  const a = parseFloat(numA.value);
  const b = parseFloat(numB.value);
  if (isNaN(a) || isNaN(b)) {
    result.className = 'error';
    result.textContent = 'Please enter valid numbers';
    return;
  }

  calcBtn.disabled = true;
  calcBtn.textContent = 'Calculating...';

  try {
    const res = await fetch('/api/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ a, operator: selectedOp, b }),
    });
    const data = await res.json();
    if (!res.ok) {
      result.className = 'error';
      result.textContent = data.detail || 'Error';
      expression.textContent = '';
    } else {
      expression.textContent = `${a} ${selectedOp} ${b}`;
      result.className = 'result';
      result.textContent = data.result;
    }
  } catch (e) {
    result.className = 'error';
    result.textContent = 'Network error';
    expression.textContent = '';
  } finally {
    calcBtn.disabled = false;
    calcBtn.textContent = 'Calculate';
  }
});
</script>
</body>
</html>
