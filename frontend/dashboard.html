<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevCrew - Multi-Agent Visualization</title>
<style>
  :root {
    --planner: #8b5cf6;
    --coder: #06b6d4;
    --tester: #f59e0b;
    --crew: #10b981;
    --bg: #0f0c29;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --muted: rgba(255,255,255,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Header --- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,12,41,0.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--planner), var(--coder));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .title { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  .title span { color: var(--muted); font-weight: 300; margin-left: 8px; font-size: 13px; }
  .status-badge {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .status-badge.idle { background: rgba(255,255,255,0.06); color: var(--muted); }
  .status-badge.running { background: rgba(16,185,129,0.15); color: #10b981; }
  .status-badge.done { background: rgba(139,92,246,0.15); color: #8b5cf6; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .running .status-dot { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* --- Pipeline --- */
  .pipeline-section {
    padding: 24px;
    display: flex; justify-content: center;
  }
  .pipeline {
    display: flex; align-items: center; gap: 0;
    position: relative;
  }
  .agent-node {
    display: flex; flex-direction: column; align-items: center;
    width: 180px; position: relative; z-index: 2;
  }
  .agent-icon {
    width: 64px; height: 64px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff;
    border: 2px solid transparent;
    transition: all 0.3s;
    position: relative;
  }
  .agent-icon.planner-icon { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.3); }
  .agent-icon.coder-icon   { background: rgba(6,182,212,0.2);   border-color: rgba(6,182,212,0.3); }
  .agent-icon.tester-icon  { background: rgba(245,158,11,0.2);  border-color: rgba(245,158,11,0.3); }

  .agent-icon.active.planner-icon {
    background: rgba(139,92,246,0.4); border-color: var(--planner);
    box-shadow: 0 0 30px rgba(139,92,246,0.3);
  }
  .agent-icon.active.coder-icon {
    background: rgba(6,182,212,0.4); border-color: var(--coder);
    box-shadow: 0 0 30px rgba(6,182,212,0.3);
  }
  .agent-icon.active.tester-icon {
    background: rgba(245,158,11,0.4); border-color: var(--tester);
    box-shadow: 0 0 30px rgba(245,158,11,0.3);
  }
  .agent-icon.done { opacity: 0.5; }
  .agent-icon.done::after {
    content: '\2713'; position: absolute; top: -4px; right: -4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--crew); color: #fff; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .agent-label {
    margin-top: 10px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
  }
  .agent-model {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .agent-status {
    font-size: 11px; margin-top: 6px; padding: 2px 8px; border-radius: 8px;
    background: rgba(255,255,255,0.06); color: var(--muted);
    transition: all 0.3s;
  }
  .agent-status.active { color: #fff; }
  .agent-status.active.planner-status { background: rgba(139,92,246,0.2); }
  .agent-status.active.coder-status   { background: rgba(6,182,212,0.2); }
  .agent-status.active.tester-status  { background: rgba(245,158,11,0.2); }

  /* Arrow between nodes */
  .arrow {
    width: 60px; height: 2px; position: relative; z-index: 1;
    background: var(--border); margin: 0 -4px; margin-bottom: 50px;
  }
  .arrow::after {
    content: ''; position: absolute; right: -1px; top: -4px;
    border: 5px solid transparent; border-left-color: var(--border);
  }
  .arrow.lit { background: linear-gradient(90deg, var(--planner), var(--coder)); }
  .arrow.lit2 { background: linear-gradient(90deg, var(--coder), var(--tester)); }
  .arrow.lit, .arrow.lit2 { height: 2px; }
  .arrow.lit::after { border-left-color: var(--coder); }
  .arrow.lit2::after { border-left-color: var(--tester); }

  /* --- Main grid --- */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    padding: 0 24px 24px;
    min-height: 50vh;
  }
  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .panel-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .panel-dot.planner { background: var(--planner); }
  .panel-dot.coder   { background: var(--coder); }
  .panel-dot.tester  { background: var(--tester); }
  .panel-count {
    margin-left: auto; font-size: 11px; color: var(--muted);
    background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 8px;
  }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 12px;
    font-size: 12px; line-height: 1.6;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* --- Log entries --- */
  .log-entry {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeSlide 0.25s ease-out;
  }
  .log-entry:last-child { border-bottom: none; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-time { color: var(--muted); font-size: 11px; }
  .log-tag {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin: 0 4px;
  }
  .log-tag.llm { background: rgba(139,92,246,0.15); color: var(--planner); }
  .log-tag.tool { background: rgba(6,182,212,0.15); color: var(--coder); }
  .log-tag.step { background: rgba(245,158,11,0.15); color: var(--tester); }
  .log-tag.crew { background: rgba(16,185,129,0.15); color: var(--crew); }
  .log-msg { color: rgba(255,255,255,0.7); word-break: break-all; }
  .log-msg .tool-name { color: var(--coder); font-weight: 600; }
  .log-msg .llm-preview { color: rgba(255,255,255,0.5); }

  /* --- Timeline (bottom) --- */
  .timeline-section {
    padding: 0 24px 24px;
  }
  .timeline-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .timeline-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .timeline-body {
    max-height: 200px; overflow-y: auto; padding: 12px 16px;
    font-size: 12px;
  }
  .timeline-body::-webkit-scrollbar { width: 4px; }
  .timeline-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .tl-row {
    display: flex; gap: 12px; padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeSlide 0.25s ease-out;
  }
  .tl-elapsed {
    width: 50px; text-align: right; color: var(--muted); flex-shrink: 0;
  }
  .tl-source {
    width: 30px; text-align: center; flex-shrink: 0;
  }
  .tl-source-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    vertical-align: middle;
  }
  .tl-source-dot.planner { background: var(--planner); }
  .tl-source-dot.coder   { background: var(--coder); }
  .tl-source-dot.tester  { background: var(--tester); }
  .tl-source-dot.crew    { background: var(--crew); }
  .tl-source-dot.tool    { background: var(--coder); }
  .tl-msg { flex: 1; color: rgba(255,255,255,0.65); word-break: break-all; }

  /* --- Empty state --- */
  .empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-size: 13px;
    padding: 24px; text-align: center;
  }

  /* --- Timer --- */
  .timer {
    font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">D</div>
    <div class="title">DevCrew<span>Multi-Agent Visualization</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="timer" id="timer">0.0s</div>
    <div class="status-badge idle" id="globalStatus">
      <div class="status-dot"></div>
      <span>Idle</span>
    </div>
  </div>
</div>

<!-- Pipeline diagram -->
<div class="pipeline-section">
  <div class="pipeline">
    <div class="agent-node" id="plannerNode">
      <div class="agent-icon planner-icon" id="plannerIcon">&#128203;</div>
      <div class="agent-label">Planner</div>
      <div class="agent-model">MiniMax-M2.7</div>
      <div class="agent-status planner-status" id="plannerStatus">Waiting</div>
    </div>
    <div class="arrow" id="arrow1"></div>
    <div class="agent-node" id="coderNode">
      <div class="agent-icon coder-icon" id="coderIcon">&#128187;</div>
      <div class="agent-label">Coder</div>
      <div class="agent-model">Kimi-K2.6</div>
      <div class="agent-status coder-status" id="coderStatus">Waiting</div>
    </div>
    <div class="arrow" id="arrow2"></div>
    <div class="agent-node" id="testerNode">
      <div class="agent-icon tester-icon" id="testerIcon">&#128270;</div>
      <div class="agent-label">Tester</div>
      <div class="agent-model">Kimi-K2.6</div>
      <div class="agent-status tester-status" id="testerStatus">Waiting</div>
    </div>
  </div>
</div>

<!-- Agent panels -->
<div class="main-grid">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot planner"></div>
      Planner
      <div class="panel-count" id="plannerCount">0</div>
    </div>
    <div class="panel-body" id="plannerLog">
      <div class="empty">Waiting for events...</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot coder"></div>
      Coder
      <div class="panel-count" id="coderCount">0</div>
    </div>
    <div class="panel-body" id="coderLog">
      <div class="empty">Waiting for events...</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot tester"></div>
      Tester
      <div class="panel-count" id="testerCount">0</div>
    </div>
    <div class="panel-body" id="testerLog">
      <div class="empty">Waiting for events...</div>
    </div>
  </div>
</div>

<!-- Full timeline -->
<div class="timeline-section">
  <div class="timeline-panel">
    <div class="timeline-header">
      <div class="panel-dot" style="background:var(--crew)"></div>
      Timeline
      <div class="panel-count" id="totalEvents">0</div>
    </div>
    <div class="timeline-body" id="timeline">
      <div class="empty">No events yet</div>
    </div>
  </div>
</div>

<script>
// --- State ---
const state = {
  planner: { active: false, done: false, count: 0 },
  coder:   { active: false, done: false, count: 0 },
  tester:  { active: false, done: false, count: 0 },
  crewRunning: false,
  totalEvents: 0,
  startTime: null,
  currentAgent: null,  // track which agent is currently working
};

const MAX_PANEL_ENTRIES = 200;
const MAX_TIMELINE_ENTRIES = 300;

// --- DOM refs ---
const els = {
  plannerIcon: document.getElementById('plannerIcon'),
  coderIcon: document.getElementById('coderIcon'),
  testerIcon: document.getElementById('testerIcon'),
  plannerStatus: document.getElementById('plannerStatus'),
  coderStatus: document.getElementById('coderStatus'),
  testerStatus: document.getElementById('testerStatus'),
  plannerLog: document.getElementById('plannerLog'),
  coderLog: document.getElementById('coderLog'),
  testerLog: document.getElementById('testerLog'),
  plannerCount: document.getElementById('plannerCount'),
  coderCount: document.getElementById('coderCount'),
  testerCount: document.getElementById('testerCount'),
  totalEvents: document.getElementById('totalEvents'),
  timeline: document.getElementById('timeline'),
  globalStatus: document.getElementById('globalStatus'),
  timer: document.getElementById('timer'),
  arrow1: document.getElementById('arrow1'),
  arrow2: document.getElementById('arrow2'),
};

// --- Helpers ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function classifySource(src) {
  const s = src.toLowerCase().trim();
  if (s.includes('architect') || s.includes('planner')) return 'planner';
  if (s.includes('developer') || s.includes('coder')) return 'coder';
  if (s.includes('qa') || s.includes('engineer') || s.includes('tester')) return 'tester';
  if (s === 'tool') return 'tool';
  return 'crew';
}

function parseTag(msg) {
  if (msg.startsWith('LLM:')) return { type: 'llm', text: msg.slice(4).trim() };
  if (msg.startsWith('Tool call:')) return { type: 'tool', text: msg.slice(10).trim() };
  if (msg.startsWith('Step:')) return { type: 'step', text: msg.slice(5).trim() };
  return { type: 'crew', text: msg };
}

function formatMsg(msg) {
  const tag = parseTag(msg);
  if (tag.type === 'tool') {
    const m = tag.text.match(/^(\S+?)\((.*)\)/);
    if (m) return `<span class="log-tag tool">TOOL</span> <span class="tool-name">${esc(m[1])}</span>(${esc(m[2])})`;
    return `<span class="log-tag tool">TOOL</span> ${esc(tag.text)}`;
  }
  if (tag.type === 'llm') {
    return `<span class="log-tag llm">LLM</span> <span class="llm-preview">${esc(tag.text)}</span>`;
  }
  if (tag.type === 'step') {
    return `<span class="log-tag step">STEP</span> ${esc(tag.text)}`;
  }
  return `<span class="log-tag crew">CREW</span> ${esc(tag.text)}`;
}

// --- Update agent visual state ---
function updateAgentVisual(agent) {
  const s = state[agent];
  const icon = els[agent + 'Icon'];
  const status = els[agent + 'Status'];

  icon.classList.remove('active', 'done');
  status.classList.remove('active');
  status.className = `agent-status ${agent}-status`;

  if (s.done) {
    icon.classList.add('done');
    status.textContent = 'Done';
  } else if (s.active) {
    icon.classList.add('active');
    status.classList.add('active');
    status.textContent = 'Working...';
  } else {
    status.textContent = 'Waiting';
  }
}

function updateArrows() {
  els.arrow1.className = state.planner.done ? 'arrow lit' : 'arrow';
  els.arrow2.className = state.coder.done ? 'arrow lit2' : 'arrow';
}

function updateGlobalStatus() {
  const badge = els.globalStatus;
  if (state.crewRunning) {
    // Check if all done
    if (state.planner.done && state.coder.done && state.tester.done) {
      badge.className = 'status-badge done';
      badge.innerHTML = '<div class="status-dot"></div><span>Completed</span>';
      state.crewRunning = false;
    } else {
      badge.className = 'status-badge running';
      badge.innerHTML = '<div class="status-dot"></div><span>Running</span>';
    }
  } else {
    badge.className = 'status-badge idle';
    badge.innerHTML = '<div class="status-dot"></div><span>Idle</span>';
  }
}

// --- Add event to panel ---
function addToPanel(agent, event) {
  const log = els[agent + 'Log'];
  const empty = log.querySelector('.empty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-time">${esc(event.ts)}</span>
    ${formatMsg(event.message)}
  `;
  log.appendChild(entry);

  // Trim old entries to prevent DOM bloat
  while (log.children.length > MAX_PANEL_ENTRIES) {
    log.removeChild(log.firstChild);
  }

  log.scrollTop = log.scrollHeight;

  state[agent].count++;
  els[agent + 'Count'].textContent = state[agent].count;
}

function addToTimeline(event) {
  const tl = els.timeline;
  const empty = tl.querySelector('.empty');
  if (empty) empty.remove();

  const agent = classifySource(event.source);
  // Tool events inherit the current active agent's color
  const dotClass = (agent === 'tool' && state.currentAgent) ? state.currentAgent : agent;
  const row = document.createElement('div');
  row.className = 'tl-row';
  row.innerHTML = `
    <span class="tl-elapsed">${event.elapsed}s</span>
    <span class="tl-source"><span class="tl-source-dot ${dotClass}"></span></span>
    <span class="tl-msg">${esc(event.message)}</span>
  `;
  tl.appendChild(row);

  // Trim old entries to prevent DOM bloat
  while (tl.children.length > MAX_TIMELINE_ENTRIES) {
    tl.removeChild(tl.firstChild);
  }

  tl.scrollTop = tl.scrollHeight;

  state.totalEvents++;
  els.totalEvents.textContent = state.totalEvents;
}

// --- Process one event ---
function processEvent(event, isHistory = false) {
  const agent = classifySource(event.source);
  const msg = event.message;

  // Detect state transitions
  if (agent === 'crew') {
    if (msg.includes('Crew started')) {
      state.crewRunning = true;
      state.startTime = Date.now();
      state.currentAgent = null;
      // Reset all agent states for a new crew run
      state.planner = { active: false, done: false, count: 0 };
      state.coder = { active: false, done: false, count: 0 };
      state.tester = { active: false, done: false, count: 0 };
      state.totalEvents = 0;
      updateAgentVisual('planner');
      updateAgentVisual('coder');
      updateAgentVisual('tester');
      updateArrows();
      els.plannerCount.textContent = '0';
      els.coderCount.textContent = '0';
      els.testerCount.textContent = '0';
      els.totalEvents.textContent = '0';
      // Clear panel content on reset
      for (const a of ['planner', 'coder', 'tester']) {
        const log = els[a + 'Log'];
        log.innerHTML = '<div class="empty">Waiting for events...</div>';
      }
      // Clear timeline
      els.timeline.innerHTML = '<div class="empty">No events yet</div>';
    }
    if (msg.includes('Crew completed')) {
      // Mark all agents as done
      for (const a of ['planner', 'coder', 'tester']) {
        state[a].active = false;
        state[a].done = true;
        updateAgentVisual(a);
      }
      state.currentAgent = null;
      state.crewRunning = false;
      updateArrows();
    }
    // Keep backward compat with Task started/done events
    if (msg.includes('Task started')) {
      if (msg.includes('planner') || msg.includes('plan_task')) {
        _activateAgent('planner');
      }
      if (msg.includes('coder') || msg.includes('code_task')) {
        _activateAgent('coder');
      }
      if (msg.includes('tester') || msg.includes('test_task')) {
        _activateAgent('tester');
      }
    }
    if (msg.includes('Task done')) {
      if (msg.includes('planner') || msg.includes('plan_task')) {
        state.planner.active = false; state.planner.done = true;
        updateAgentVisual('planner');
        updateArrows();
      }
      if (msg.includes('coder') || msg.includes('code_task')) {
        state.coder.active = false; state.coder.done = true;
        updateAgentVisual('coder');
        updateArrows();
      }
      if (msg.includes('tester') || msg.includes('test_task')) {
        state.tester.active = false; state.tester.done = true;
        updateAgentVisual('tester');
      }
    }
  }

  // Auto-track active agent: when an agent (not TOOL/CREW) emits an event,
  // that agent becomes the current active agent
  if (agent !== 'crew' && agent !== 'tool') {
    _activateAgent(agent);
  }

  // Add to per-agent panel
  if (agent !== 'crew' && agent !== 'tool') {
    addToPanel(agent, event);
  } else if (agent === 'tool') {
    // Tool events go to the currently active agent's panel
    if (state.currentAgent) {
      addToPanel(state.currentAgent, event);
    }
  }

  addToTimeline(event);
  updateGlobalStatus();
}

// Activate an agent: deactivate previous agents in the pipeline order
function _activateAgent(agent) {
  const order = ['planner', 'coder', 'tester'];
  const idx = order.indexOf(agent);

  // Mark all agents before this one as done, deactivate all
  for (let i = 0; i < order.length; i++) {
    if (i < idx) {
      state[order[i]].active = false;
      state[order[i]].done = true;
    } else if (i === idx) {
      state[order[i]].active = true;
      state[order[i]].done = false;
    } else {
      state[order[i]].active = false;
      state[order[i]].done = false;
    }
    updateAgentVisual(order[i]);
  }

  state.currentAgent = agent;
  updateArrows();
}

// --- Timer ---
setInterval(() => {
  if (state.startTime) {
    const s = ((Date.now() - state.startTime) / 1000).toFixed(1);
    els.timer.textContent = s + 's';
  }
}, 200);

// --- Load history then connect SSE ---
let _lastEventTs = '';  // Track last event timestamp to avoid duplicates

async function init() {
  // Load existing log history first
  try {
    const res = await fetch('/api/history');
    if (res.ok) {
      const history = await res.json();
      for (const evt of history) {
        processEvent(evt, true);
      }
      // Remember last event to avoid replaying from SSE
      if (history.length > 0) {
        const last = history[history.length - 1];
        _lastEventTs = `${last.ts}|${last.elapsed}|${last.source}|${last.message}`;
      }
    }
  } catch (e) { /* ignore */ }

  // Then connect SSE for real-time updates
  connectSSE();
}

function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      const key = `${event.ts}|${event.elapsed}|${event.source}|${event.message}`;
      // Skip duplicates that were already loaded via /api/history
      if (_lastEventTs && key === _lastEventTs) {
        _lastEventTs = '';
        return;
      }
      processEvent(event);
    } catch (err) { /* ignore parse errors */ }
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 3000);
  };
}
init();
</script>
